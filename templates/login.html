<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Ñuñoa Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card card p-4">
        <div class="text-center mb-4">
            <img src="/static/logo.png" alt="Ñuñoa Master" class="logo">
            <h2 class="fw-bold text-primary">Iniciar Sesión</h2>
        </div>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Usuario" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>

        <div class="text-center mt-4 text-muted small">
            Ñuñoa Master<br>
            Chile - 2026
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
