{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow border-0" style="margin-top: 80px;">
            <div class="card-body p-5 text-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Ñuñoa Master" style="height: 120px; margin-bottom: 20px;">
                <h3 class="fw-bold text-primary mb-4">Iniciar Sesión</h3>

                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Usuario" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-sign-in-alt"></i> Ingresar
                    </button>
                </form>

                <div class="text-center mt-4 text-muted small">
                    Ñuñoa Master - Chile 2026
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
