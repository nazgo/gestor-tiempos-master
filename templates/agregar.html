{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0">
            <!-- Header -->
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">
                    <i class="fas fa-plus-circle"></i> Agregar Nuevo Tiempo
                </h4>
            </div>

            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre del Nadador</label>
                        <input type="text" name="nombre" class="form-control form-control-lg" 
                               value="{{ nadador.nombre + ' ' + nadador.apellido if nadador else '' }}" 
                               placeholder="Ej: Juan Pérez" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Género</label>
                            <select name="genero" class="form-select">
                                <option value="Masculino" {{ 'selected' if nadador and nadador.genero == 'Masculino' else '' }}>Masculino</option>
                                <option value="Femenino" {{ 'selected' if nadador and nadador.genero == 'Femenino' else '' }}>Femenino</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estilo</label>
                            <select name="estilo" class="form-select" required>
                                {% for e in estilos %}
                                <option value="{{ e }}">{{ e }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Distancia</label>
                            <select name="distancia" class="form-select" required>
                                {% for d in distancias %}
                                <option value="{{ d }}">{{ d }} metros</option>
                                {% endfor %}
                            </select>
                        </div>
<div class="col-md-6 mb-3">
    <label class="form-label">Piscina</label>
    <select name="piscina" class="form-select">
        <option value="25 metros" {{ 'selected' if request.form.get('piscina') == '25 metros' else '' }}>25 metros</option>
        <option value="50 metros" {{ 'selected' if request.form.get('piscina') == '50 metros' else '' }}>50 metros</option>
    </select>
</div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría de Edad</label>
                            <input type="text" class="form-control" 
                                   value="{{ nadador.categoria_master if nadador else 'Master' }}" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tiempo (MM:SS.cc)</label>
                            <input type="text" name="tiempo" class="form-control" 
                                   placeholder="01:23.45" required>
                            <small class="text-muted">Formato exacto: minutos:segundos.centésimas</small>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Fecha de la prueba</label>
                        <input type="date" name="fecha" class="form-control" value="{{ today }}">
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="button" class="btn btn-secondary me-md-2" onclick="history.back()">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-success btn-lg px-5">
                            <i class="fas fa-save"></i> Guardar Tiempo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
