{% extends 'base.html' %}

{% block content %}
<div class="container py-5">

    <div class="text-center mb-5">
        <h2 class="fw-bold text-primary">
            <i class="fas fa-calendar-alt"></i>
            Calendario de Competencias
        </h2>

        <p class="text-muted">
            Seleccione el año que desea consultar
        </p>
    </div>

    <div class="row justify-content-center g-4">

        <div class="col-md-5 col-lg-4">
            <a
                href="{{ url_for(
                    'calendario_competencias',
                    anio=2025
                ) }}"
                class="text-decoration-none"
            >
                <div class="card tarjeta-anio shadow-sm border-0 h-100">
                    <div class="card-body text-center py-5">

                        <div class="icono-anio mb-3">
                            <i class="fas fa-calendar-check"></i>
                        </div>

                        <h2 class="fw-bold mb-2">
                            2025
                        </h2>

                        <p class="text-muted mb-0">
                            Ver calendario de competencias
                        </p>

                    </div>
                </div>
            </a>
        </div>

        <div class="col-md-5 col-lg-4">
            <a
                href="{{ url_for(
                    'calendario_competencias',
                    anio=2026
                ) }}"
                class="text-decoration-none"
            >
                <div class="card tarjeta-anio shadow-sm border-0 h-100">
                    <div class="card-body text-center py-5">

                        <div class="icono-anio mb-3">
                            <i class="fas fa-calendar-check"></i>
                        </div>

                        <h2 class="fw-bold mb-2">
                            2026
                        </h2>

                        <p class="text-muted mb-0">
                            Ver calendario de competencias
                        </p>

                    </div>
                </div>
            </a>
        </div>

    </div>

    <div class="text-center mt-5">
        <a
            href="{{ url_for('index') }}"
            class="btn btn-secondary"
        >
            ← Volver al Inicio
        </a>
    </div>

</div>

<style>
    body {
        background: #f6f7fb;
    }

    .tarjeta-anio {
        color: #2f3237;
        border-radius: 18px;
        transition:
            transform 0.18s ease,
            box-shadow 0.18s ease;
    }

    .tarjeta-anio:hover {
        transform: translateY(-6px);
        box-shadow:
            0 12px 28px
            rgba(0, 0, 0, 0.13) !important;
    }

    .icono-anio {
        display: inline-flex;
        width: 72px;
        height: 72px;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        background: #00a8a8;
        border-radius: 50%;
        font-size: 2rem;
    }
</style>
{% endblock %}
