{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-light">
                <h4>✏️ Editar Tiempo</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre del Nadador</label>
                        <input type="text" name="nombre" value="{{ tiempo.nombre_nadador }}" class="form-control form-control-lg" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estilo</label>
                            <select name="estilo" class="form-select" required>
                                {% for e in estilos %}
                                <option value="{{ e }}" {{ 'selected' if e == tiempo.estilo else '' }}>{{ e }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Distancia (metros)</label>
                            <select name="distancia" class="form-select" required>
                                {% for d in distancias %}
                                <option value="{{ d }}" {{ 'selected' if d == tiempo.distancia else '' }}>{{ d }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Piscina</label>
                            <select name="piscina" class="form-select">
                                <option value="25 metros" {{ 'selected' if tiempo.piscina == '25 metros' else '' }}>25 metros</option>
                                <option value="50 metros" {{ 'selected' if tiempo.piscina == '50 metros' else '' }}>50 metros</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tiempo (MM:SS.cc)</label>
                            <input type="text" name="tiempo" value="{{ tiempo.tiempo }}" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Fecha</label>
                        <input type="date" name="fecha" value="{{ tiempo.fecha }}" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/listar" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-warning btn-lg">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
