{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>📥 Importar Tiempos Masivos (CSV)</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="file" name="file" class="form-control" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Importar CSV</button>
                </form>
                <hr>
                <p class="small text-muted">
                    Formato CSV: nombre,estilo,distancia,tiempo,fecha<br>
                    Ejemplo: Carlos Gomez,Mariposa,50,00:37.02,2026-04-02
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
